version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: cyberasset_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyberasset}
      POSTGRES_USER: ${POSTGRES_USER:-cyberasset_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyberasset_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cyberasset_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyberasset_user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-cyberasset}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: cyberasset_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:80"

volumes:
  pgdata:
